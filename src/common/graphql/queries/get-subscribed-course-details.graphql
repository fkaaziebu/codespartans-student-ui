query GetSubscribedCourseDetails($courseId: String!) {
    getSubscribedCourseDetails(courseId: $courseId) {
        id
        avatar_url
        currency
        description
        domains
        level
        price
        title
        instructor {
            id
            email
            name
        }
        approved_version {
            id
            questions {
                id
                question_number
                description
                options
                hints
                estimated_time_in_ms
                difficulty
                correct_answer
                solution_steps
                tags
                type
                marks
            }
            test_suites {
                id
                description
                keywords
                title
                difficulty
                suite_type
                # attempts {
                #     id
                #     submitted_answers {
                #         id
                #         answer_provided
                #         question {
                #             id
                #             correct_answer
                #         }
                #         is_flagged
                #     }
                #     status
                #     mode
                # }
                questions {
                    id
                }
            }
        }
    }
}
