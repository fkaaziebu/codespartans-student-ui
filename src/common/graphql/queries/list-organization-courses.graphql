query ListOrganizationCourses(
    $organizationId: String
    $searchTerm: String
    $filter: CourseFilterInput
    $pagination: PaginationInput
) {
    listOrganizationCourses(
        organizationId: $organizationId
        searchTerm: $searchTerm
        filter: $filter
        pagination: $pagination
    ) {
        edges {
            node {
                id
                avatar_url
                currency
                description
                domains
                is_subscribed
                level
                price
                title
                total_questions
                estimated_duration
                updated_at
                inserted_at
                approved_version {
                    id
                    status
                    inserted_at
                    updated_at
                    version_number
                    test_suites {
                        id
                        description
                        difficulty
                        keywords
                        suite_type
                        image_url
                        title
                    }
                }
            }
        }
    }
}
